version: 2

models:
  - name: stg_orders
    columns:
      - name: order_id
        tests:
          - not_null
          - unique
      - name: order_date
        tests: [not_null]
      - name: product_id
        tests: [not_null]
      - name: quantity
        tests: [not_null]

  - name: fact_sales
    columns:
      - name: order_date
        tests: [not_null]
      - name: product_id
        tests: [not_null]
