services:
  postgres:
    image: postgres:16
    container_name: retail_postgres
    environment:
      POSTGRES_USER: retail
      POSTGRES_PASSWORD: retail
      POSTGRES_DB: retail_dw
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - C:/Users/shivm/.dbt:/home/airflow/.dbt
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U retail -d retail_dw"]
      interval: 5s
      timeout: 5s
      retries: 10

  airflow-db:
    image: postgres:16
    container_name: airflow_postgres
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    ports:
      - "5433:5432"
    volumes:
      - airflow_pgdata:/var/lib/postgresql/data
      - C:/Users/shivm/.dbt:/home/airflow/.dbt
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow -d airflow"]
      interval: 5s
      timeout: 5s
      retries: 10

  airflow-webserver:
    hostname: airflow-webserver
    build:
      context: .
      dockerfile: Dockerfile.airflow
    container_name: airflow_web
    depends_on:
      airflow-db:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-db:5432/airflow
      AIRFLOW__CORE__FERNET_KEY: "0123456789abcdef0123456789abcdef"
      AIRFLOW__CORE__LOAD_EXAMPLES: "False"
      AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "True"
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: retail_dw
      DB_USER: retail
      DB_PASSWORD: retail
      AIRFLOW__WEBSERVER__WEB_SERVER_WORKER_TIMEOUT: "300"
      AIRFLOW__WEBSERVER__WORKERS: "1"
      AIRFLOW__LOGGING__BASE_LOG_FOLDER: /opt/airflow/logs
    volumes:
      - ./logs:/opt/airflow/logs
      - ./dags:/opt/airflow/dags
      - ./scripts:/opt/airflow/scripts
      - ./retail_dbt:/opt/airflow/retail_dbt
      - ./data:/opt/airflow/data
      - ./.env:/opt/airflow/.env
      - C:/Users/shivm/.dbt:/home/airflow/.dbt
    ports:
      - "8080:8080"
    command: ["bash", "-c", "airflow db migrate && airflow users create --username admin --password admin --firstname Admin --lastname User --role Admin --email admin@example.com || true && airflow webserver"]

  airflow-scheduler:
    hostname: airflow-scheduler
    build:
      context: .
      dockerfile: Dockerfile.airflow
    container_name: airflow_scheduler
    depends_on:
      airflow-db:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-db:5432/airflow
      AIRFLOW__CORE__FERNET_KEY: "0123456789abcdef0123456789abcdef"
      AIRFLOW__CORE__LOAD_EXAMPLES: "False"
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: retail_dw
      DB_USER: retail
      DB_PASSWORD: retail
      AIRFLOW__LOGGING__BASE_LOG_FOLDER: /opt/airflow/logs
    volumes:
      - ./logs:/opt/airflow/logs
      - ./dags:/opt/airflow/dags
      - ./scripts:/opt/airflow/scripts
      - ./retail_dbt:/opt/airflow/retail_dbt
      - ./data:/opt/airflow/data
      - ./.env:/opt/airflow/.env
      - C:/Users/shivm/.dbt:/home/airflow/.dbt
    command: ["bash", "-c", "airflow scheduler"]
volumes:
  pgdata:
  airflow_pgdata:
